services:
  - type: web
    name: fieldcheck-backend
    runtime: node
    plan: standard
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_SECURE
        value: "false"
      - key: FRONTEND_URL
        value: https://fieldcheck-app.onrender.com
      - key: DISABLE_EMAIL
        value: "false"
      - key: USE_INMEMORY_DB
        value: "false"
